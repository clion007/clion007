name: Update GitHub Stats

on:
  schedule:
    # 每天 UTC 时间 0 点更新一次（可按需修改）
    - cron: '0 0 * * *'
  # 也允许手动触发
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 允许 action 推送更新到仓库
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub Stats
        uses: jstrieb/github-stats@master
        with:
          # 你的 GitHub 用户名
          username: clion007
          # 在 README 中查找并替换下面这对注释之间的内容
          start-marker: '<!-- GITHUB_STATS:START -->'
          end-marker: '<!-- GITHUB_STATS:END -->'

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update GitHub stats" && git push)
