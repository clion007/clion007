name: 更新 GitHub 统计
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: 生成统计内容并更新 README
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          USER="clion007"
          USER_DATA=$(gh api "users/${USER}")
          REPOS_DATA=$(gh api "users/${USER}/repos?per_page=100&type=owner" --jq '.')

          TOTAL_STARS=$(echo "$REPOS_DATA" | jq '[.[].stargazers_count] | add')
          TOTAL_FORKS=$(echo "$REPOS_DATA" | jq '[.[].forks_count] | add')
          PUBLIC_REPOS=$(echo "$USER_DATA" | jq '.public_repos')
          FOLLOWERS=$(echo "$USER_DATA" | jq '.followers')
          FOLLOWING=$(echo "$USER_DATA" | jq '.following')

          STATS_MD="| 统计项 | 数量 |
          |---|---|
          | 📦 公共仓库 | ${PUBLIC_REPOS} |
          | ⭐ 总 Stars | ${TOTAL_STARS} |
          | 🍴 总 Forks | ${TOTAL_FORKS} |
          | 👥 关注者 | ${FOLLOWERS} |
          | 👤 正在关注 | ${FOLLOWING} |"          

          # 用 Python 替换注释标记内的内容
          python3 <<-PY
          import re

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          # 替换 <!-- STATS:START --> ... <!-- STATS:END --> 之间的内容
          new_block = f"<!-- STATS:START -->\n{'''$STATS_MD'''}\n<!-- STATS:END -->"
          updated = re.sub(
              r'<!-- STATS:START -->.*?<!-- STATS:END -->',
              new_block,
              content,
              flags=re.DOTALL
          )

          # 如果没有找到标记，则在文件末尾追加
          if updated == content:
              updated = content.rstrip() + "\n\n" + new_block + "\n"

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(updated)
          PY
          
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats" && git push)    
        
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 2
