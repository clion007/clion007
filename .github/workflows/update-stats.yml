name: 更新 GitHub 统计
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: 生成统计内容并更新 README
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          USER="clion007"
          USER_DATA=$(gh api "users/${USER}")
          REPOS_DATA=$(gh api "users/${USER}/repos?per_page=100&type=owner" --jq '.')

          TOTAL_STARS=$(echo "$REPOS_DATA" | jq '[.[].stargazers_count] | add')
          TOTAL_FORKS=$(echo "$REPOS_DATA" | jq '[.[].forks_count] | add')
          PUBLIC_REPOS=$(echo "$USER_DATA" | jq '.public_repos')
          FOLLOWERS=$(echo "$USER_DATA" | jq '.followers')
          FOLLOWING=$(echo "$USER_DATA" | jq '.following')

          export STATS_MD="| 统计项 | 数量 |
          |---|---|
          | 📦 公共仓库 | ${PUBLIC_REPOS} |
          | ⭐ 总 Stars | ${TOTAL_STARS} |
          | 🍴 总 Forks | ${TOTAL_FORKS} |
          | 👥 关注者 | ${FOLLOWERS} |
          | 👤 正在关注 | ${FOLLOWING} |"

          # 加引号避免 shell 展开，用 os.environ 读取变量
          python3 <<'PY'
          import re, os

          stats_md = os.environ['STATS_MD']
          start_marker = '<!-- STATS:START -->'
          end_marker   = '<!-- STATS:END -->'
          new_block    = f"{start_marker}\n{stats_md}\n{end_marker}"

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          # 匹配所有 STATS 块（支持标记前后有可选空格）
          pattern = r'<!--\s*STATS:START\s*-->.*?<!--\s*STATS:END\s*-->'
          matches = list(re.finditer(pattern, content, flags=re.DOTALL))

          if matches:
              # 记录第一个标记的起始位置
              insert_pos = matches[0].start()
              # 删除所有旧块
              clean = re.sub(pattern, '', content, flags=re.DOTALL)
              # 在原第一个标记位置插入新块
              content = clean[:insert_pos] + new_block + clean[insert_pos:]
          else:
              # 没有任何标记，追加到文件末尾
              content = content.rstrip() + "\n\n" + new_block + "\n"

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(content)
          PY

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats" && git push)

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 2
